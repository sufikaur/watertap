default:  # TODO: should have removal rates for (e.g.) sulfate, nitrate, arsenic, etc.  
  recovery_frac_mass_H2O:
    value: 1
    units: dimensionless
  default_removal_frac_mass_comp:
    value: 0
    units: dimensionless
  removal_frac_mass_comp:
    tds:
      value: 0.9
      units: dimensionless
      constituent_longform: Total Dissolved Solids (TDS)
  energy_electric_flow_vol_inlet:
    value: 0.00542 
    units: kWh/m^3
    reference: Average from output from standard designs from EPA-WBS Anion Exchange model
  NaCl_dose:
    value: 0.5486
    units: kg/m^3
    reference: Average from output from standard designs from EPA-WBS Anion Exchange model 
  resin_replacement:
    value: 0.0016
    units: kg/m^3
    reference: Average from output from standard designs from EPA-WBS Anion Exchange model 
  capital_cost:
    # Using cost parameters for anion exchange as default
    cost_factor: None
    reference: Regressed from output from standard designs from EPA-WBS Anion Exchange model
    validity_range:
      flow_vol:
        lower_bound:
          value: 0.305
          units: Mgallons/day
        upper_bound:
          value: 75.072
          units: Mgallons/day
      sulfate_influent: # model uses tds concentration, not sulfate
        lower_bound:
          value: 50
          units: mg/L
        upper_bound:
          value: 150
          units: mg/L
    capital_a_parameter:
      value: 8.61434
      units: dimensionless
    capital_b_parameter:
      value: 0.821700
      units: dimensionless
    capital_c_parameter:
      value: 5.44709E-06
      units: dimensionless
    capital_d_parameter:
      value: 6.17757E-05
      units: dimensionless
