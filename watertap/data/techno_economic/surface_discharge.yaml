default:
  capital_cost:
    cost_factor: None
    reference: https://www.lenntech.es/processes/surface-water-discharge-of-brine.htm
    validity_range:
      lower_bound:
        value: 0
        units: m^3/day
      upper_bound:
        value: 200000
        units: m^3/day
    reference_state:
      value: 1
      units: m^3/day
    capital_a_parameter:
      value: 647.78
      units: USD_2020 # assumed
    capital_b_parameter:
      value: 0.8759
      units: dimensionless
    pipe_cost_basis:
      value: 35000
      units: USD_2020/(miles*inches)
      reference: Produced water case studies
  lift_height:
    value: 100
    units: ft
  pipe_diameter:
    value: 8
    units: inches
  pipe_distance:
    value: 0 # default case includes no pipe costs
    units: miles
