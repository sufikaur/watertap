    units: kWh/m^3
  capital_cost:
    basis: flow_vol
    cost_factor: None
    reference: Voutchkov, N. (2018). Desalination Project Cost Estimating and Management. Figure 4.6
    reference_state:
      value: 1
      units: m^3/day
