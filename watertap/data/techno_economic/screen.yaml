default: # default is for wedge wire screen
  energy_electric_flow_vol_inlet:
    value: 0.0
    units: kWh/m^3
  capital_cost:
    basis: flow_vol
    cost_factor: None
    reference: Voutchkov, N. (2018). Desalination Project Cost Estimating and Management. Figure 4.6
    validity_range:
      lower_bound:
        value: 10000 # estimated
        units: m^3/day
      upper_bound:
        value: 400000
        units: m^3/day
    reference_state:
      value: 1
      units: m^3/day
    capital_a_parameter:
      value: 6.545
      units: USD_2018
    capital_b_parameter:
      value: 1
      units: dimensionless
  recovery_frac_mass_H2O:
    value: 0.9999
    units: dimensionless
  default_removal_frac_mass_comp:
    value: 0
    units: dimensionless
  removal_frac_mass_comp:
    tss:
      value: 0.6
      units: dimensionless
      constituent_longform: Total Suspended Solids (TSS)
